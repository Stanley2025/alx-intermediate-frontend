<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Navigation Bar</title>
    <!-- Link to the CSS file as instructed -->
    <link href="./output.css" rel="stylesheet">
    <style>
        /* This media query will stack the nav items on smaller screens */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body class="p-4">
    <header class="mb-4">
        <h1 class="text-3xl font-bold">Flexbox Navigation Bar</h1>
    </header>

    <!-- Navigation bar added as per instructions -->
    <nav class="flex space-x-5 justify-center bg-gray-300 text-white p-4"> 
        <a class="px-2 text-xl hover:bg-gray-500 p-2 rounded-lg" href="#">Home</a> 
        <a class="px-2 text-xl hover:bg-gray-500 p-2 rounded-lg" href="#">About</a> 
        <a class="px-2 text-xl hover:bg-gray-500 p-2 rounded-lg" href="#">Services</a> 
        <a class="px-2 text-xl hover:bg-gray-500 p-2 rounded-lg" href="#">Contact</a> 
    </nav>

</body>
</html>
