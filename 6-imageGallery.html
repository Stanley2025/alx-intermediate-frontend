<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout with Image Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    
        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="p-4 bg-gray-100"> 
    <header class="bg-blue-500 text-white p-4 rounded-lg">
        <h1 class="text-3xl">Grid and Flexbox Layout</h1>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-3 gap-4 mt-4">
        <section class="lg:col-span-2 flex bg-white p-4 rounded-lg shadow-md">
            <div class="p-4 bg-red-200 w-1/2 rounded-l-lg">Flexbox Item 1</div>
            <div class="p-4 bg-red-400 w-1/2 rounded-r-lg">Flexbox Item 2</div>
        </section>
        <aside class="bg-green-200 p-4 rounded-lg shadow-md">Sidebar</aside>
    </main>

  
    <section class="mt-8">
        <h2 class="text-2xl font-bold mb-4">Image Gallery</h2>
        
       
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            
            
            <div>
                <img src="https://picsum.photos/seed/picsum/600/400" alt="Gallery Image 1" class="w-full h-auto rounded-lg shadow-md">
            </div>
            
           
            <div>
                <img src="https://picsum.photos/seed/picsum2/600/400" alt="Gallery Image 2" class="w-full h-auto rounded-lg shadow-md">
            </div>
            
            
            <div>
                <img src="https://picsum.photos/seed/picsum3/600/400" alt="Gallery Image 3" class="w-full h-auto rounded-lg shadow-md">
            </div>
        
            <div>
                <img src="https://picsum.photos/seed/picsum4/600/400" alt="Gallery Image 4" class="w-full h-auto rounded-lg shadow-md">
            </div>
            
          
            <div>
                <img src="https://picsum.photos/seed/picsum5/600/400" alt="Gallery Image 5" class="w-full h-auto rounded-lg shadow-md">
            </div>
            
            <!-- Gallery Image 6 -->
            <div>
                <img src="https://picsum.photos/seed/picsum6/600/400" alt="Gallery Image 6" class="w-full h-auto rounded-lg shadow-md">
            </div>
        </div>
    </section>
    <!-- ===== END OF IMAGE GALLERY SECTION ===== -->


    <footer class="bg-gray-800 text-white p-4 mt-8 rounded-lg">
        <p>© 2024 John Doe's Blog</p>
    </footer>
</body>
</html>
